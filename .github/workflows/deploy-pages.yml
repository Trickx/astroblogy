name: Deploy Jekyll Site to Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Checkout PixInsight Workflow source
        uses: actions/checkout@v4
        with:
          repository: Trickx/PixInsight-Workflow-Doc
          path: ./pixinsight-workflow-src
          token: ${{ secrets.PIXDOC_REPO_TOKEN != '' && secrets.PIXDOC_REPO_TOKEN || github.token }}

      - name: Validate PixInsight Workflow checkout
        run: |
          if [ ! -f ./pixinsight-workflow-src/mkdocs.yml ]; then
            echo "PixInsight-Workflow-Doc checkout failed or mkdocs.yml missing."
            echo "If the repository is private, set repo secret PIXDOC_REPO_TOKEN with read access to Trickx/PixInsight-Workflow-Doc."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build PixInsight Workflow docs
        run: |
          mkdocs build \
            --config-file ./pixinsight-workflow-src/mkdocs.yml \
            --site-dir ./_site/pixinsight-workflow

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
