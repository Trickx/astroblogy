site_name: PixInsight Workflow Doku
site_description: Dokumentation eines PixInsight-Workflows mit mkdocs-material
site_author: Sven Kopetzki
site_url: https://tricx.de/pixinsight-workflow/

repo_name: Home
repo_url: https://tricx.de/

nav:
  - Start: index.md
  - Folder Structure: schritte/folder-structure.md
  - Imaging Catalog: schritte/meridian.md
  - OSC-Workflow:
      1. Blink (Frame-Check): schritte/blink.md
      2. Weighted Batch Preprocessing: schritte/weighted-batch-preprocessing.md
      3. Hintergrundkorrektur:
          1. GraXpert: schritte/graxpert.md
          2. Gradient Correction: schritte/gradient-correction.md
          4. Dynamic Background Extraction: schritte/dynamic-background-extraction.md
      4. BlurXTerminator Correct Only (optional): schritte/blur-xterminator-correct-only.md
      5. Image Solver: schritte/image-solver.md
      6. Spectrophotometric Color Calibration: schritte/spectrophotometric-color-calibration.md
      7. Background Neutralisation: schritte/background-neutralization.md
#      9. BlurXTerminator: schritte/blur-xterminator.md
#      8. NoiseXTerminator: schritte/noise-xterminator.md
#      10. StarXTerminator: schritte/star-xterminator.md
#      11. StarComposer: schritte/star-composer.md
#      12. Multiscale Adaptive Stretch: schritte/multiscale-adaptive-stretch.md

#- Workflow: workflow.md
#      - 03 Fast Batch Preprocessing (optional): schritte/fast-batch-preprocessing.md
#     - 07 Multiscale Gradient Correction (optional): schritte/multiscale-gradient-correction.md
#     - 08 Background Neutralization: schritte/background-neutralization.md

theme:
  name: material
  language: de
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/home.js
